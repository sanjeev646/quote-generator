<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Quote Generator</title>
<style>
  body {
    font-family: Georgia, serif;
    text-align: center;
    max-width: 500px;
    margin: 100px auto;
  }
  #quote {
    font-size: 22px;
    font-style: italic;
    min-height: 100px;
  }
  #author {
    margin-top: 10px;
    color: #777;
    font-weight: bold;
  }
  button {
    margin-top: 25px;
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
  }
</style>
</head>
<body>

  <h1>Quote Generator</h1>

  <p id="quote">Click the button to get inspired.</p>
  <p id="author"></p>

  <button onclick="newQuote()">New Quote</button>

  <script>
    const quotes = [
      { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
      { text: "Life is what happens when you're busy making other plans.", author: "John Lennon" },
      { text: "The future belongs to those who believe in the beauty of their dreams.", author: "Eleanor Roosevelt" },
      { text: "It is during our darkest moments that we must focus to see the light.", author: "Aristotle" },
      { text: "Success is not final, failure is not fatal: it is the courage to continue that counts.", author: "Winston Churchill" },
      { text: "Do not wait to strike till the iron is hot; make it hot by striking.", author: "William B. Sprague" }
    ];

    function newQuote() {
      const random = quotes[Math.floor(Math.random() * quotes.length)];
      document.getElementById('quote').textContent = `"${random.text}"`;
      document.getElementById('author').textContent = `— ${random.author}`;
    }
  </script>

</body>
</html>
